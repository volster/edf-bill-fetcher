name: Build Executables

on: [push]

jobs:
build:
strategy:
matrix:
os: [macos-latest, windows-latest]

```
runs-on: ${{ matrix.os }}

steps:
  - name: Checkout Repository
    uses: actions/checkout@v4

  - name: Set up Python
    uses: actions/setup-python@v5
    with:
      python-version: '3.10'

  - name: Install Dependencies
    run: |
      pip install libpff-python pandas pdfplumber beautifulsoup4 openpyxl numpy pyinstaller

  - name: Build App
    run: |
      pyinstaller --onefile --windowed --name "EDF_Forensic_Audit" edf_collector.py

  - name: Upload Artifact
    uses: actions/upload-artifact@v4
    with:
      name: ${{ matrix.os }}-build
      path: dist/
```
